<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#0a0a0a">
    <title>Fit Data by Toni - Entrenamiento Inteligente</title>
    
    <!-- 🔥 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #ff4444;
            --accent-dark: #cc0000;
            --success: #22dd88;
            --warning: #ffaa00;
            --gold: #ffd700;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .navbar {
            background-color: var(--bg-secondary);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .nav-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-right span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        button {
            background-color: var(--accent);
            color: var(--text-primary);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        button:hover {
            background-color: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 68, 68, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: var(--bg-secondary);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        button.secondary:hover {
            background-color: var(--accent);
            color: var(--text-primary);
        }

        button.success {
            background-color: var(--success);
            color: #000;
        }

        button.success:hover {
            background-color: #1acc77;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .container-sm {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .auth-form {
            background-color: var(--bg-secondary);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin: 3rem auto;
        }

        .auth-form h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .auth-form p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid var(--text-secondary);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 68, 68, 0.2);
        }

        .auth-toggle {
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-toggle button {
            background: none;
            color: var(--accent);
            padding: 0;
            font-weight: 600;
            cursor: pointer;
            margin-left: 0.3rem;
        }

        .error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .dashboard-header {
            margin-bottom: 2rem;
        }

        .dashboard-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .section-title {
            font-size: 1.6rem;
            margin: 2rem 0 1rem 0;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 0.5rem;
        }

        .routines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .routine-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--text-secondary);
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .routine-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(255, 68, 68, 0.2);
            transform: translateY(-4px);
        }

        .routine-card h3 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .routine-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .routine-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .tag {
            background-color: var(--bg-primary);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--accent);
        }

        .routine-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .routine-actions button {
            flex: 1;
            padding: 0.6rem;
            font-size: 0.85rem;
            min-width: 80px;
        }

        .exercise-block {
            background-color: var(--bg-primary);
            border: 1px solid var(--text-secondary);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .exercise-info h3 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .exercise-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .exercise-image {
            width: 150px;
            height: 150px;
            background-color: var(--bg-secondary);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            flex-shrink: 0;
        }

        .series-container {
            margin-top: 1.5rem;
        }

        .series-container h4 {
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .series-row {
            display: grid;
            grid-template-columns: 60px 80px 80px 50px auto;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            align-items: center;
            padding: 0.8rem;
            background-color: var(--bg-secondary);
            border-radius: 6px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .series-row.completed {
            border-color: var(--success);
            background-color: rgba(34, 221, 136, 0.1);
        }

        .series-row.gold {
            border-color: var(--gold);
            background-color: rgba(255, 215, 0, 0.1);
        }

        .series-row.red {
            border-color: #ff6b6b;
            background-color: rgba(255, 107, 107, 0.1);
        }

        .series-label {
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
        }

        .series-input-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .series-input-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .series-input input {
            width: 70px;
            padding: 0.7rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--text-secondary);
            color: var(--text-primary);
            border-radius: 4px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .series-input input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .checkbox-series {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-series input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success);
        }

        .timer-display {
            background-color: var(--bg-secondary);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin: 2rem auto;
            display: none;
            max-width: 400px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .timer-display.active {
            display: block;
        }

        .timer-display h2 {
            color: var(--accent);
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .timer-display p {
            color: var(--text-secondary);
        }

        .muscle-map {
            background-color: var(--bg-secondary);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .muscle-map h4 {
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .muscle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.8rem;
        }

        .muscle-badge {
            background-color: var(--bg-primary);
            border: 1px solid var(--text-secondary);
            padding: 0.8rem;
            border-radius: 6px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .muscle-badge.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 600;
        }

        .summary-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .summary-modal.active {
            display: flex;
        }

        .summary-content {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--accent);
        }

        .summary-content h2 {
            color: var(--accent);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .summary-stat {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem;
            background-color: var(--bg-primary);
            border-radius: 6px;
            margin-bottom: 0.8rem;
        }

        .summary-stat label {
            color: var(--text-secondary);
        }

        .summary-stat .value {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .workout-difficulty {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .difficulty-btn {
            padding: 1rem;
            border: 2px solid var(--text-secondary);
            background-color: transparent;
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .difficulty-btn.light {
            border-color: var(--success);
        }

        .difficulty-btn.light:hover, .difficulty-btn.light.selected {
            background-color: var(--success);
            color: #000;
        }

        .difficulty-btn.medium {
            border-color: var(--warning);
        }

        .difficulty-btn.medium:hover, .difficulty-btn.medium.selected {
            background-color: var(--warning);
            color: #000;
        }

        .difficulty-btn.heavy {
            border-color: var(--accent);
        }

        .difficulty-btn.heavy:hover, .difficulty-btn.heavy.selected {
            background-color: var(--accent);
            color: #000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--accent);
        }

        .modal-close {
            float: right;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--accent);
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--accent-dark);
        }

        .search-input {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid var(--text-secondary);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 68, 68, 0.2);
        }

        .muscle-group-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .muscle-group-tab {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--text-secondary);
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .muscle-group-tab.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        .muscle-group-tab:hover {
            border-color: var(--accent);
        }

        .exercise-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .exercise-item {
            background-color: var(--bg-primary);
            border: 1px solid var(--text-secondary);
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .exercise-item:hover {
            border-color: var(--accent);
            background-color: rgba(255, 68, 68, 0.1);
        }

        .exercise-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success);
        }

        .exercise-item-text {
            flex: 1;
        }

        .exercise-item-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .exercise-item-muscle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .profile-card {
            background-color: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .profile-card h3 {
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .profile-card p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .admin-table th {
            background-color: var(--bg-secondary);
            color: var(--accent);
            padding: 1rem;
            text-align: left;
            border-bottom: 2px solid var(--accent);
        }

        .admin-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--text-secondary);
            color: var(--text-primary);
        }

        .admin-table tr:hover {
            background-color: rgba(255, 68, 68, 0.05);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: var(--bg-primary);
            border-radius: 5px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--success);
            transition: width 0.3s ease;
        }

        .pending-users-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .pending-user-item {
            background-color: var(--bg-primary);
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--text-secondary);
        }

        .pending-user-item button {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        .volume-by-muscle {
            background-color: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .volume-muscle-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem;
            background-color: var(--bg-primary);
            margin-bottom: 0.5rem;
            border-radius: 4px;
        }

        .volume-muscle-item strong {
            color: var(--accent);
        }

        .radio-group {
            display: flex;
            gap: 1.5rem;
            margin: 0.5rem 0;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .weight-history-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 1rem;
        }

        .weight-history-item {
            background-color: var(--bg-primary);
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .weight-history-item span {
            color: var(--text-secondary);
        }

        .weight-history-item strong {
            color: var(--accent);
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .navbar {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }

            .nav-right {
                width: 100%;
                justify-content: space-around;
            }

            .routines-grid {
                grid-template-columns: 1fr;
            }

            .series-row {
                grid-template-columns: 60px 70px 70px 40px auto;
                font-size: 0.8rem;
            }

            .exercise-image {
                width: 120px;
                height: 120px;
            }

            .dashboard-stats {
                grid-template-columns: 1fr;
            }

            .timer-display {
                max-width: 90%;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading-screen" class="screen active">
        <div class="loading">Cargando Fit Data by Toni</div>
    </div>

    <nav class="navbar hidden" id="main-navbar">
        <div class="navbar-brand">Fit Data by Toni</div>
        <div class="nav-right" id="navbar-content">
            <span id="navbar-user"></span>
            <button onclick="goToProfile()" id="profile-btn" class="secondary hidden">👤 Perfil</button>
            <button onclick="goToAdmin()" id="admin-btn" class="secondary hidden">🔐 Admin</button>
            <button onclick="goToUserPanel()" id="back-to-user-btn" class="secondary hidden">👤 Usuario</button>
            <button onclick="logout()" id="logout-btn" class="hidden">Salir</button>
        </div>
    </nav>

    <div id="login-screen" class="screen">
        <div class="container-sm">
            <div class="auth-form">
                <h1 id="auth-title">Fit Data by Toni</h1>
                <p id="auth-subtitle">Entrena más inteligente, crece más fuerte</p>

                <form onsubmit="handleAuth(event)">
                    <!-- Username (Register only) -->
                    <div class="form-group hidden" id="group-username">
                        <label>Nombre de Usuario</label>
                        <input type="text" id="login-username" placeholder="Tu nombre">
                    </div>

                    <div class="form-group">
                        <label>Email</label>

        function playBeep() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                }, i * 300);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim().toLowerCase();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            document.getElementById('register-error').textContent = '';
            document.getElementById('register-confirm-error').textContent = '';

            if (username.length < 3) {
                document.getElementById('register-error').textContent = 'Mínimo 3 caracteres';
                return;
            }

            if (password.length < 6) {
                document.getElementById('register-error').textContent = 'Contraseña: mínimo 6 caracteres';
                return;
            }

            if (password !== confirm) {
                document.getElementById('register-confirm-error').textContent = 'Las contraseñas no coinciden';
                return;
            }

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                await db.collection('users').doc(user.uid).set({
                    username: username,
                    email: email,
                    approved: false,
                    routines: [],
                    workouts: [],
                    sharedRoutines: [],
                    sharedCycles: [],
                    restTime: 60,
                    body: {},
                    weightHistory: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert('¡Cuenta creada! Espera a que un administrador la apruebe.');
                await auth.signOut();
                switchToLogin();
            } catch (error) {
                document.getElementById('register-error').textContent = error.message;
            }
        }

            if(error) error.textContent = '';

            if (isRegistering) {
                if(title) title.textContent = 'Crear Cuenta';
                if(btn) btn.textContent = 'Registrarse';
                if(switchText) switchText.textContent = '¿Ya tienes cuenta?';
                if(switchLink) switchLink.textContent = 'Inicia Sesión';

            } else {

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            if(errorEl) errorEl.textContent = '';

            try {
                if (isRegistering) {
                    // REGISTER
                    const username = document.getElementById('login-username').value.trim();
                    const code = document.getElementById('register-code').value.trim();

                    if (code !== ACCESS_CODE) {
                        throw new Error('Código de acceso incorrecto');
                    }

                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);

                    await db.collection('users').doc(userCredential.user.uid).set({
                        username: username,
                        email: email,
                        createdAt: new Date().toISOString(),
                        approved: false,
                        routines: [],
                        workouts: []
                    });

                    alert('Cuenta creada con éxito. Espera aprobación del administrador.');
                } else {
                    // LOGIN
                    await auth.signInWithEmailAndPassword(email, password);
                }
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (error.code === 'auth/email-already-in-use') msg = 'Email ya registrado';
                if (error.code === 'auth/wrong-password') msg = 'Contraseña incorrecta';
                if (error.code === 'auth/user-not-found') msg = 'Usuario no encontrado';
                if(errorEl) errorEl.textContent = msg;
                else alert(msg);
            }
        }
 catch (error) {
                document.getElementById('login-error').textContent = '❌ Email o contraseña incorrectos';
            }
        }

                    <h3>${routine.name}</h3>
                    <p>${routine.description || 'Sin descripción'}</p>
                    <div class="routine-tags">
                        ${routine.exercises.map(ex => {

        async function deleteRoutine(index) {

            currentUserData.routines.splice(index, 1);
            await db.collection('users').doc(currentUser.uid).update({ routines: currentUserData.routines });
            renderDashboard();
        }

        async function shareRoutine(index) {
            if (!isAdmin()) return;
            const routine = currentUserData.routines[index];
            const usersSnap = await db.collection('users').where('approved', '==', true).get();
            const users = usersSnap.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
            const usernames = users.map(u => u.username).join(', ');
            const selected = prompt(`Compartir "${routine.name}" con usuarios (separados por coma):\n\nDisponibles: ${usernames}`);
            if (!selected) return;

            const selectedUsers = selected.split(',').map(s => s.trim());
            for (const user of users) {
                if (selectedUsers.includes(user.username)) {
                    const sharedRoutines = user.sharedRoutines || [];
                    if (!sharedRoutines.some(r => r.name === routine.name)) {
                        sharedRoutines.push(routine);
                        await db.collection('users').doc(user.uid).update({ sharedRoutines });
                    }
                }
            }
            alert('Rutina compartida exitosamente');
        }

        async function handleCreateRoutine(e) {
            e.preventDefault();
            const name = document.getElementById('routine-name').value.trim();
            const description = document.getElementById('routine-description').value.trim();

            if (selectedExercises.size === 0) {

            }

            }));

        function startWorkout(index) {
            currentRoutine = { ...currentUserData.routines[index], index, isShared: false };
            currentWorkout = {
                routineName: currentRoutine.name,
                date: new Date().toISOString(),
                exercises: JSON.parse(JSON.stringify(currentRoutine.exercises))
            };
            showScreen('workout-screen');
            renderWorkout();
        }

        function startSharedWorkout(index) {
            currentRoutine = { ...currentUserData.sharedRoutines[index], index, isShared: true };
            currentWorkout = {
                routineName: currentRoutine.name,
                date: new Date().toISOString(),
                exercises: JSON.parse(JSON.stringify(currentRoutine.exercises))
            };
            showScreen('workout-screen');
            renderWorkout();
        }

        function renderWorkout() {
            document.getElementById('workout-title').textContent = currentWorkout.routineName;
            
            const muscles = [...new Set(currentWorkout.exercises.map(ex => {
                const exercise = exercisesDB.find(e => e.id === ex.id);
                return exercise ? exercise.muscle : null;
            }).filter(Boolean))];

            document.getElementById('muscle-grid').innerHTML = muscles.map(m => 
                `<div class="muscle-badge active">${m}</div>`
            ).join('');

            const container = document.getElementById('exercises-container');
            container.innerHTML = currentWorkout.exercises.map((ex, exIndex) => {
                const exercise = exercisesDB.find(e => e.id === ex.id);
                if (!exercise) return '';

                const lastWorkout = currentUserData.workouts?.filter(w => 
                    w.exercises.some(e => e.id === ex.id)
                ).pop();

                const lastExerciseData = lastWorkout?.exercises.find(e => e.id === ex.id);

                return `
                    <div class="exercise-block">
                        <div class="exercise-header">
                            <div class="exercise-info">
                                <h3>${getExerciseName(exercise)}</h3>
                                <p>${exercise.muscle}</p>
                            </div>
                            <div class="exercise-image">${exercise.emoji}</div>
                        </div>
                        <div class="series-container">
                            <h4>${t('Series')}</h4>
                            ${ex.series.map((serie, serieIndex) => renderSerie(exIndex, serieIndex, serie, lastExerciseData)).join('')}
                            <button onclick="addSerie(${exIndex})" class="secondary" style="width: 100%; margin-top: 1rem;">+ Agregar Serie</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSerie(exIndex, serieIndex, serie, lastExerciseData) {
            const lastSerie = lastExerciseData?.series?.[serieIndex];
            let rowClass = '';
            if (serie.completed) rowClass = 'completed';
            else if (lastSerie && serie.weight > lastSerie.weight) rowClass = 'gold';
            else if (lastSerie && serie.weight < lastSerie.weight) rowClass = 'red';

            return `
                <div class="series-row ${rowClass}">
                    <div class="series-label">S${serieIndex + 1}</div>
                    <div class="series-input-group">
                        <label class="series-input-label">${t('Peso')}</label>
                        <div class="series-input">
                            <input type="number" value="${serie.weight || ''}" 
                                onchange="updateSerie(${exIndex}, ${serieIndex}, 'weight', this.value)"
                                placeholder="kg">
                        </div>
                    </div>
                    <div class="series-input-group">
                        <label class="series-input-label">${t('Reps')}</label>
                        <div class="series-input">
                            <input type="number" value="${serie.reps || ''}" 
                                onchange="updateSerie(${exIndex}, ${serieIndex}, 'reps', this.value)"
                                placeholder="0">
                        </div>
                    </div>
                    <div class="checkbox-series">
                        <input type="checkbox" ${serie.completed ? 'checked' : ''} 
                            onchange="toggleSerieComplete(${exIndex}, ${serieIndex})">
                    </div>
                    <button onclick="removeSerie(${exIndex}, ${serieIndex})" class="secondary" style="padding: 0.5rem;">🗑️</button>
                </div>
            `;
        }

        function updateSerie(exIndex, serieIndex, field, value) {
            currentWorkout.exercises[exIndex].series[serieIndex][field] = parseFloat(value) || 0;
            renderWorkout();
        }

        function toggleSerieComplete(exIndex, serieIndex) {
            const serie = currentWorkout.exercises[exIndex].series[serieIndex];
            serie.completed = !serie.completed;
            
            if (serie.completed && serieIndex < currentWorkout.exercises[exIndex].series.length - 1) {
                startRestTimer();
            }
            
            renderWorkout();
        }

        function addSerie(exIndex) {
            const lastSerie = currentWorkout.exercises[exIndex].series[currentWorkout.exercises[exIndex].series.length - 1];
            currentWorkout.exercises[exIndex].series.push({
                weight: lastSerie?.weight || 0,
                reps: lastSerie?.reps || 0,
                completed: false
            });
            renderWorkout();
        }

        function removeSerie(exIndex, serieIndex) {
            if (currentWorkout.exercises[exIndex].series.length <= 1) {
                alert('Debe haber al menos una serie');
                return;
            }
            currentWorkout.exercises[exIndex].series.splice(serieIndex, 1);
            renderWorkout();
        }

        function startRestTimer() {
            clearInterval(timerInterval);
            let timeLeft = restTime;
            const timerDisplay = document.getElementById('timer-display');
            const timerText = document.getElementById('timer-text');
            
            timerDisplay.classList.add('active');
            
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerText.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    playBeep();
                    setTimeout(() => {
                        timerDisplay.classList.remove('active');
                    }, 2000);
                }
            }, 1000);
        }

        function skipRestTime() {
            clearInterval(timerInterval);
            document.getElementById('timer-display').classList.remove('active');
        }

        async function finishWorkout() {
            const totalSeries = currentWorkout.exercises.reduce((sum, ex) => sum + ex.series.length, 0);
            const completedSeries = currentWorkout.exercises.reduce((sum, ex) => 
                sum + ex.series.filter(s => s.completed).length, 0);
            
            const totalVolume = currentWorkout.exercises.reduce((sum, ex) => 
                sum + ex.series.reduce((exSum, s) => exSum + (s.weight * s.reps), 0), 0);

            currentWorkout.totalSeries = totalSeries;
            currentWorkout.completedSeries = completedSeries;
            currentWorkout.totalVolume = totalVolume;
            currentWorkout.difficulty = null;

            showSummaryModal();
        }

        function showSummaryModal() {
            const modal = document.getElementById('summary-modal');
            const summaryBody = document.getElementById('summary-body');

            summaryBody.innerHTML = `
                <div class="summary-stat">
                    <label>Series Completadas:</label>
                    <div class="value">${currentWorkout.completedSeries} / ${currentWorkout.totalSeries}</div>
                </div>
                <div class="summary-stat">
                    <label>Volumen Total:</label>
                    <div class="value">${Math.round(currentWorkout.totalVolume)} kg</div>
                </div>
                <div class="summary-stat">
                    <label>Ejercicios:</label>
                    <div class="value">${currentWorkout.exercises.length}</div>
                </div>
            `;

            const totalWorkouts = (currentUserData.workouts?.length || 0) + 1;
            const totalVolume = (currentUserData.workouts?.reduce((sum, w) => sum + (w.totalVolume || 0), 0) || 0) + currentWorkout.totalVolume;
            const totalSeries = (currentUserData.workouts?.reduce((sum, w) => sum + (w.completedSeries || 0), 0) || 0) + currentWorkout.completedSeries;
            const avgVolume = Math.round(totalVolume / totalWorkouts);

            document.getElementById('lifetime-workouts').textContent = totalWorkouts;
            document.getElementById('lifetime-volume').textContent = Math.round(totalVolume) + ' kg';
            document.getElementById('lifetime-sets').textContent = totalSeries;
            document.getElementById('lifetime-avg').textContent = avgVolume + ' kg';

            modal.classList.add('active');
        }

        async function assignToUser() {
            const uid = document.getElementById('assign-user-select').value;
            const type = document.getElementById('assign-type-select').value;

            if (!uid) {
                alert('Selecciona un usuario');
                return;
            }

            if (type === 'routine') {
                const routineIndex = document.getElementById('assign-routine-select').value;
                if (routineIndex === '') {
                    alert('Selecciona una rutina');
                    return;
                }

                const routine = currentUserData.routines[parseInt(routineIndex)];
                const userDoc = await db.collection('users').doc(uid).get();
                const userData = userDoc.data();
                const sharedRoutines = userData.sharedRoutines || [];
                sharedRoutines.push(routine);
                await db.collection('users').doc(uid).update({ sharedRoutines });
                alert('Rutina asignada exitosamente');
            } else {
                const cycleId = document.getElementById('assign-cycle-select').value;
                if (!cycleId) {
                    alert('Selecciona un ciclo');
                    return;
                }

                const userDoc = await db.collection('users').doc(uid).get();
                const userData = userDoc.data();
                const sharedCycles = userData.sharedCycles || [];
                if (!sharedCycles.includes(cycleId)) {
                    sharedCycles.push(cycleId);
                    await db.collection('users').doc(uid).update({ sharedCycles });
                }
                alert('Ciclo asignado exitosamente');
            }
        }

            const description = document.getElementById('cycle-description').value.trim();

            if (!name) {
                alert('Ingresa un nombre para el ciclo');
                return;
            }

            await db.collection('cycles').add({
                name,
                description,
                routineIds: [],
                createdBy: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert('Ciclo creado exitosamente');
            document.getElementById('cycle-name').value = '';
            document.getElementById('cycle-description').value = '';
            renderAdmin();
        }

        async function loadNutritionConfig() {
            const configSnap = await db.collection('config').doc('nutrition').get();
            const enabled = configSnap.exists ? configSnap.data().enabled : false;
            document.getElementById('enable-nutrition-tracking').checked = enabled;
        }

        async function toggleNutritionTracking() {
            const enabled = document.getElementById('enable-nutrition-tracking').checked;
            await db.collection('config').doc('nutrition').set({ enabled });
            alert(enabled ? 'Seguimiento nutricional habilitado' : 'Seguimiento nutricional deshabilitado');
        }

        function showSharedRoutines() {
            alert('Funcionalidad de rutinas compartidas - Ver en dashboard');
        }

        function closeSharedModal() {
            document.getElementById('shared-modal').classList.remove('active');
        }

        console.log('✅ Fit Data by Toni con Firebase cargado');
        console.log('🔥 Recuerda reemplazar firebaseConfig con tu configuración');
    </script>
</body>
</html>
